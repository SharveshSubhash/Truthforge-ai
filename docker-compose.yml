version: "3.9"

services:
  truthforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: truthforge:latest
    container_name: truthforge_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Optional: Ollama for fully-local inference ────────────────────────────
  # Start with: docker-compose --profile local up
  ollama:
    image: ollama/ollama:latest
    container_name: truthforge_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - local

volumes:
  ollama_data:
