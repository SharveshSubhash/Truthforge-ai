name: TRUTHFORGE AI MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------
  # Phase 1: Code Quality & Static Security
  # ---------------------------------------------------------
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Linting Tools
        run: pip install flake8 bandit
        
      - name: Lint with Flake8
        run: flake8 agents/ core/ pipeline/ ui/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Security Scan with Bandit
        run: bandit -r agents/ core/ pipeline/ ui/ -ll

  # ---------------------------------------------------------
  # Phase 2: Deterministic Testing (Fallback Mode)
  # ---------------------------------------------------------
  deterministic-tests:
    name: Core Logic & Security Tests
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Production Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
          
      - name: Install CI Testing Tools
        run: |
          pip install pytest pytest-cov
          
      - name: Run Test Suite (Fallback Mode)
        run: pytest tests/ -v --cov=agents --cov=core --cov-report=xml
        
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------
  # Phase 3: MLOps Live Model Integration Test
  # ---------------------------------------------------------
  live-model-tests:
    name: Live LLM Integration Tests
    needs: deterministic-tests
    # Corrected condition: Evaluate secrets directly
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGCHAIN_TRACING_V2: true
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      LANGCHAIN_PROJECT: truthforge-ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Production Dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
          
      - name: Install CI Testing Tools
        run: pip install pytest
        
      - name: Run Integration Tests with Live API
        run: pytest tests/integration/ -v

  # ---------------------------------------------------------
  # Phase 4: Build and Publish Docker Image
  # ---------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: [deterministic-tests] 
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}